name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build Pages site
        run: npm run build:pages

      - name: Package Pages artifact
        run: |
          rm -f github-pages.tar github-pages.tar.gz
          tar --directory dist --create --file github-pages.tar .
          gzip --stdout github-pages.tar > github-pages.tar.gz

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: github-pages.tar.gz
          if-no-files-found: error
          compression-level: 0

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5