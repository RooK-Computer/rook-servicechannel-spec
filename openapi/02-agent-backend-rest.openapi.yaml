openapi: 3.1.0
info:
  title: RooK Agent-Backend REST API Draft
  version: 0.5.0-draft
  description: |
    Erster Arbeitsstand fuer die zentrale REST-Schnittstelle zwischen RooK Agent
    und RooK Backend.

    Dieser Entwurf haelt nur die aus dem Konzept eindeutig ableitbaren fachlichen
    Elemente fest. Die Grundentscheidungen zu Authentisierung,
    Session-Lifecycle, Heartbeat-Semantik und PIN-Auslieferung sind eingearbeitet.
    Offen bleiben derzeit nur die detaillierte Fehlercode-Liste und die
    Retryability-Regeln.
servers: []
paths:
  /api/console/1/beginsession:
    post:
      tags:
        - support-sessions
      summary: Start support session
      operationId: beginSession
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSupportSessionRequest'
      responses:
        '200':
          description: Session erfolgreich gestartet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartSupportSessionResponse'
        default:
          description: Fehlerhafte Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/console/1/status:
    post:
      tags:
        - support-sessions
      summary: Get session status
      operationId: getSessionStatus
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionStatusRequest'
      responses:
        '200':
          description: Status erfolgreich geliefert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatusResponse'
        default:
          description: Fehlerhafte Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/console/1/ping:
    post:
      tags:
        - support-sessions
      summary: Send session heartbeat
      operationId: sendSessionHeartbeat
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionHeartbeatRequest'
      responses:
        '200':
          description: Heartbeat erfolgreich verarbeitet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericAckResponse'
        default:
          description: Fehlerhafte Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/console/1/endsession:
    post:
      tags:
        - support-sessions
      summary: End session
      operationId: endSession
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndSupportSessionRequest'
      responses:
        '200':
          description: Session erfolgreich beendet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericAckResponse'
        default:
          description: Fehlerhafte Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
tags:
  - name: support-sessions
    description: Agent-seitige Verwaltung aktiver Support-Sitzungen
x-draftScope:
  operationsKnownFromConcept:
    - start-support-session
    - get-session-status
    - send-session-heartbeat
    - fetch-pin
    - close-session
  unresolvedTopics:
    - detailed-error-code-list
    - retryability-rules
  decisionsFromClarification:
    agentAuthentication: trust-via-active-vpn-connection
    sessionStart: agent-posts-new-session
    pinDelivery: in-start-response
    urlPattern: /api/console/{version}/{operation}
    versionPathValue: '1'
    operationNames:
      - beginsession
      - endsession
      - status
      - ping
    httpMethods: post-only
    heartbeatFrequencySeconds: 10
    gracePeriodHeartbeats: 3
    timeoutSeconds: 30
    duplicateStartHandling: latest-start-wins
    lateHeartbeatHandling: ignore-after-grace-period
    heartbeatKeepsSessionOpen: true
    serviceParticipationRequiredForOpenSession: false
    browserDisconnectEndsSupportSession: false
    trustValidation: heartbeat-pin-and-ip-match
    ipChangeHandling: update-session-ip-on-heartbeat
    auditMinimumFields:
      - ipAddress
      - timestamp
      - eventType
    httpStatusStrategy:
      success: 200
      error: 500
components:
  schemas:
    SupportSession:
      type: object
      description: |
        Fachliche Hauptressource fuer einen aktiven Supportfall.
        Aktuell sind nur die minimal geklaerten Felder enthalten.
      additionalProperties: false
      required:
        - status
        - pin
        - ipAddress
      properties:
        status:
          $ref: '#/components/schemas/SupportSessionState'
        pin:
          type: string
          description: Kurzlebiger 4-stelliger PIN.
        ipAddress:
          type: string


    SupportSessionState:
      type: string
      description: |
        `open` bedeutet, dass die Support-Session auf Backend-Seite weiterlaeuft,
        obwohl aktuell kein Servicemitarbeiter aktiv verbunden sein muss.
        `active` bedeutet, dass ein Servicemitarbeiter aktiv auf die Konsole
        gekoppelt ist. `closed` bedeutet, dass die Session fachlich beendet ist,
        insbesondere nach manuellem Ende oder ausbleibenden Heartbeats ueber die
        Grace Period hinaus.
      enum:
        - open
        - active
        - closed

    SessionAuditInfo:
      type: object
      additionalProperties: false
      properties:
        ipAddress:
          type: string
        timestamp:
          type: string
          format: date-time
        eventType:
          type: string

    StartSupportSessionRequest:
      type: object
      description: |
        Fachliches Request-Modell fuer den Session-Start. Konkrete Felder muessen
        nach Klaerung des Authentisierungs- und Identitaetsmodells ergaenzt werden.
      additionalProperties: false
      properties: {}

    SessionStatusRequest:
      type: object
      additionalProperties: false
      required:
        - pin
      properties:
        pin:
          type: string
          minLength: 1

    StartSupportSessionResponse:
      type: object
      additionalProperties: false
      properties:
        session:
          $ref: '#/components/schemas/SupportSession'
      description: |
        Der PIN wird direkt in der Start-Response geliefert.

    SessionHeartbeatRequest:
      type: object
      description: |
        Heartbeat-Request. Der `pin` wird mitgegeben und mit der Session sowie der
        erkannten IP-Adresse abgeglichen.
      additionalProperties: false
      required:
        - pin
      properties:
        pin:
          type: string
          minLength: 1

    EndSupportSessionRequest:
      type: object
      additionalProperties: false
      required:
        - pin
      properties:
        pin:
          type: string
          minLength: 1

    GenericAckResponse:
      type: object
      additionalProperties: false
      properties: {}

    SessionStatusResponse:
      type: object
      additionalProperties: false
      properties:
        session:
          $ref: '#/components/schemas/SupportSession'

    ErrorResponse:
      type: object
      additionalProperties: false
      description: |
        Fehlerobjekt mit den minimal festgelegten Feldern. Die HTTP-Statuscode-
        Strategie ist derzeit auf `200` fuer Erfolg und `500` fuer Fehler begrenzt.
      required:
        - code
        - message
      properties:
        code:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
