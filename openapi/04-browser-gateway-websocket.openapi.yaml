openapi: 3.1.0
info:
  title: RooK Browser-Gateway WebSocket Draft
  version: 0.2.0-draft
  description: |
    Erster Arbeitsstand fuer die Browser-zu-Gateway-Schnittstelle.

    Dieser Entwurf haelt den aktuell umgesetzten Browser-Pfad fuer die
    Browser-zu-Gateway-Schnittstelle fest. Die Terminal-Berechtigung wird nach
    erfolgreichem WebSocket-Upgrade als erste Protokollnachricht uebertragen;
    das Gateway bestaetigt erfolgreiche Autorisierung mit `authorized`.

    Offen bleiben derzeit vor allem detaillierte Payload-Felder, Close-Codes
    und die langfristige Fehlerklassifikation.
servers: []
paths:
  /gateway/terminal:
    get:
      tags:
        - browser-terminal
      summary: Browser terminal websocket handshake
      description: |
        Der initiale Handshake fuer die Browser-zu-Gateway-Kommunikation. Der
        Browser braucht keine benutzerdefinierten Auth-Header; die
        Terminal-Berechtigung folgt als erste WebSocket-Nachricht.
      responses:
        '101':
          description: WebSocket-Upgrade erfolgreich
        default:
          description: Fehlerhafter Handshake
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
tags:
  - name: browser-terminal
    description: WebSocket-basierte Browser-Terminal-Sitzung
x-draftScope:
  transport: websocket
  knownFacts:
    - gateway-validates-terminal-grant
    - gateway-connects-to-console-after-validation
    - browser-and-console-stream-is-forwarded
  unresolvedTopics:
    - concrete-payload-models
    - close-codes
    - error-format-details
    - detailed-authorize-payload
  decisionsFromClarification:
    openApiScope: handshake-and-message-protocol
    grantDelivery: websocket-authorize-message
    frameTypes: text-and-binary
    controlMessagesFrameType: text
    terminalDataMayUseBinaryFrames: true
    reconnectSemantics: always-new-session
    userInputIdleClosesTerminal: false
    transportKeepaliveRequired: true
    browserDisconnectEndsOnlyBrowserTerminalSession: true
    terminalMetadataReturned: none
    authorizationFlow: post-upgrade-authorize-message
    minimumMessageTypes:
      - authorize
      - authorized
      - input
      - output
      - resize
      - error
      - close
components:
  schemas:
    BrowserTerminalSession:
      type: object
      description: |
        Fachliche Sicht auf eine Browser-Terminal-Sitzung. Konkrete Felder bleiben
        bis zur Klaerung des Protokolls offen. Eine autorisierte Sitzung darf auch
        ohne laufende Nutzereingaben offen bleiben; echte Verbindungsverluste sind
        fachlich von blosser Bedieninaktivitaet zu trennen.
      additionalProperties: false
      properties: {}

    TerminalGrantReference:
      type: object
      description: |
        Verweis auf die vom Backend ausgestellte Terminal-Berechtigung.
      additionalProperties: false
      required:
        - token
      properties:
        token:
          type: string
          minLength: 1

    ControlMessageBase:
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string

    AuthorizeMessage:
      allOf:
        - $ref: '#/components/schemas/ControlMessageBase'
        - type: object
          additionalProperties: false
          required:
            - token
          properties:
            type:
              const: authorize
            token:
              type: string
              minLength: 1

    AuthorizedMessage:
      allOf:
        - $ref: '#/components/schemas/ControlMessageBase'
        - type: object
          properties:
            type:
              const: authorized

    InputMessage:
      allOf:
        - $ref: '#/components/schemas/ControlMessageBase'
        - type: object
          properties:
            type:
              const: input

    OutputMessage:
      allOf:
        - $ref: '#/components/schemas/ControlMessageBase'
        - type: object
          properties:
            type:
              const: output

    ResizeMessage:
      allOf:
        - $ref: '#/components/schemas/ControlMessageBase'
        - type: object
          properties:
            type:
              const: resize

    ProtocolErrorMessage:
      allOf:
        - $ref: '#/components/schemas/ControlMessageBase'
        - type: object
          properties:
            type:
              const: error

    CloseMessage:
      allOf:
        - $ref: '#/components/schemas/ControlMessageBase'
        - type: object
          properties:
            type:
              const: close

    ErrorMessage:
      type: object
      additionalProperties: false
      description: Fehlerformat bleibt bis zur Klaerung offen.
      properties: {}
